name: Update Prices Hourly

# 매시간 정각에 가격 데이터 갱신 + 자동 커밋
on:
  schedule:
    - cron: '0 * * * *'   # 매시간 0분 (UTC)
  workflow_dispatch:       # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate prices
        run: python price_engine.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --staged --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "chore: hourly price update [skip ci] $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
